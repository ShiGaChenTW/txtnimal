<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>TasksTxt 雙語命名決選</title>
  <style>
    :root {
      --bg: #f3f0e8;
      --panel: #fffdf7;
      --ink: #20231f;
      --muted: #666b63;
      --line: #b9b9ad;
      --accent: #176b47;
      --accent-ink: #fffdf7;
      --warn: #8a4a13;
      --shadow: 5px 5px 0 #20231f;
      --mono: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111411;
        --panel: #191d19;
        --ink: #e9ede5;
        --muted: #abb3a8;
        --line: #566056;
        --accent: #7dd8a8;
        --accent-ink: #102217;
        --warn: #f0ae70;
        --shadow: 5px 5px 0 #7a8679;
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(color-mix(in srgb, var(--line) 16%, transparent) 1px, transparent 1px),
        var(--bg);
      background-size: 100% 28px;
      font-family: var(--mono);
      line-height: 1.55;
    }
    button, input { font: inherit; }
    button { color: inherit; }
    .shell { width: min(1120px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 56px; }
    .prompt { color: var(--accent); font-weight: 800; letter-spacing: .04em; }
    header { border: 2px solid var(--ink); background: var(--panel); box-shadow: var(--shadow); padding: clamp(20px, 5vw, 48px); }
    h1 { margin: .25rem 0 .4rem; font-size: clamp(2rem, 7vw, 4.6rem); line-height: .98; letter-spacing: -.07em; }
    .lede { max-width: 68ch; color: var(--muted); margin: 1rem 0 0; }
    .status {
      position: sticky; top: 10px; z-index: 5; margin: 26px 0;
      border: 2px solid var(--ink); background: var(--panel); padding: 14px;
      display: flex; gap: 16px; align-items: center; justify-content: space-between; flex-wrap: wrap;
    }
    .status-copy { min-width: 0; }
    .status small { display: block; color: var(--muted); }
    #currentChoice { font-weight: 850; overflow-wrap: anywhere; }
    .copy {
      border: 2px solid var(--accent); background: var(--accent); color: var(--accent-ink);
      padding: 10px 14px; cursor: pointer; font-weight: 800;
    }
    .copy:disabled { opacity: .45; cursor: not-allowed; }
    .filters { margin: 30px 0 18px; }
    .filters h2 { margin: 0 0 10px; font-size: 1rem; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter {
      border: 1px solid var(--ink); background: var(--panel); padding: 7px 11px; cursor: pointer;
    }
    .filter[aria-pressed="true"] { background: var(--ink); color: var(--bg); }
    .count { margin: 10px 0 0; color: var(--muted); font-size: .85rem; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .candidate { position: relative; }
    .candidate[hidden] { display: none; }
    .candidate label {
      height: 100%; min-height: 232px; display: flex; flex-direction: column; cursor: pointer;
      border: 2px solid var(--ink); background: var(--panel); padding: 18px;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }
    .candidate label:hover { transform: translate(-2px, -2px); box-shadow: 3px 3px 0 var(--ink); }
    .candidate input { position: absolute; opacity: 0; pointer-events: none; }
    .candidate input:checked + label { border-color: var(--accent); box-shadow: 5px 5px 0 var(--accent); }
    .choice-line { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .radio-ui {
      width: 23px; height: 23px; flex: 0 0 auto; border: 2px solid var(--ink); border-radius: 50%;
      display: grid; place-items: center; margin-top: 3px;
    }
    input:checked + label .radio-ui::after { content: ""; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); }
    .zh { font-size: 1.7rem; font-weight: 900; letter-spacing: .06em; }
    .en { color: var(--accent); font-weight: 750; margin-top: 2px; }
    .why { color: var(--muted); margin: 18px 0; font-size: .92rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
    .tag, .rank { border: 1px solid var(--line); padding: 2px 7px; font-size: .75rem; }
    .rank { border-color: var(--accent); color: var(--accent); font-weight: 800; }
    .notice { margin-top: 30px; border-left: 6px solid var(--warn); background: var(--panel); padding: 16px 18px; }
    .notice strong { color: var(--warn); }
    footer { margin-top: 26px; color: var(--muted); font-size: .82rem; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    :focus-visible { outline: 3px solid var(--accent); outline-offset: 4px; }
    .candidate input:focus-visible + label { outline: 3px solid var(--accent); outline-offset: 4px; }
    @media (max-width: 820px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 540px) {
      .shell { width: min(100% - 18px, 1120px); padding-top: 10px; }
      .grid { grid-template-columns: 1fr; }
      .candidate label { min-height: 200px; }
      .status { top: 4px; }
      .copy { width: 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition-duration: 0.001ms !important; animation-duration: 0.001ms !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="prompt">$ tasks-txt name --shortlist</div>
      <h1>替純文字任務<br>取一個名字。</h1>
      <p class="lede">12 組中英文名稱進入最後決選。像操作 TasksTxt 一樣：掃描、篩選、選定；每次只保留一個清楚答案。</p>
    </header>

    <section class="status" aria-label="目前選擇">
      <div class="status-copy">
        <small>&gt; CURRENT_SELECTION</small>
        <div id="currentChoice" aria-live="polite">尚未選擇</div>
      </div>
      <button class="copy" id="copyButton" type="button" disabled>複製選擇結果</button>
      <span class="sr-only" id="copyStatus" role="status" aria-live="polite"></span>
    </section>

    <section class="filters" aria-labelledby="filterTitle">
      <h2 id="filterTitle">依調性篩選</h2>
      <div class="filter-row" role="group" aria-label="名稱調性">
        <button class="filter" type="button" data-filter="all" aria-pressed="true">全部</button>
        <button class="filter" type="button" data-filter="秩序" aria-pressed="false">秩序</button>
        <button class="filter" type="button" data-filter="純文字" aria-pressed="false">純文字</button>
        <button class="filter" type="button" data-filter="簡潔" aria-pressed="false">簡潔</button>
        <button class="filter" type="button" data-filter="行動" aria-pressed="false">行動</button>
        <button class="filter" type="button" data-filter="專注" aria-pressed="false">專注</button>
        <button class="filter" type="button" data-filter="流動" aria-pressed="false">流動</button>
        <button class="filter" type="button" data-filter="品牌感" aria-pressed="false">品牌感</button>
      </div>
      <p class="count" id="resultCount" aria-live="polite">顯示 12 / 12 組</p>
    </section>

    <form id="nameForm">
      <fieldset style="border:0;padding:0;margin:0">
        <legend class="sr-only">選擇一組中英文品牌名稱</legend>
        <div class="grid" id="candidateGrid">
          <article class="candidate" data-tags="秩序 行動 品牌感">
            <input type="radio" name="brand" id="n1" value="序事 TaskOrder" data-reason="秩序與行動兼具">
            <label for="n1"><div class="choice-line"><div><div class="zh">序事</div><div class="en">TaskOrder</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">把待辦排成可行動的次序，穩健而有記憶點。</p><div class="tags"><span class="rank">推薦 #1</span><span class="tag">秩序</span><span class="tag">行動</span></div></label>
          </article>
          <article class="candidate" data-tags="純文字 行動 品牌感">
            <input type="radio" name="brand" id="n2" value="字辦 TextDo" data-reason="純文字差異明確">
            <label for="n2"><div class="choice-line"><div><div class="zh">字辦</div><div class="en">TextDo</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">用文字把事情辦完，直接點出產品的核心差異。</p><div class="tags"><span class="rank">推薦 #2</span><span class="tag">純文字</span><span class="tag">行動</span></div></label>
          </article>
          <article class="candidate" data-tags="簡潔 行動 親和">
            <input type="radio" name="brand" id="n3" value="簡事 PlainDo" data-reason="簡潔親和">
            <label for="n3"><div class="choice-line"><div><div class="zh">簡事</div><div class="en">PlainDo</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">簡單做事，不增加負擔；口吻輕巧、容易親近。</p><div class="tags"><span class="rank">推薦 #3</span><span class="tag">簡潔</span><span class="tag">親和</span></div></label>
          </article>
          <article class="candidate" data-tags="行動 純文字 沉靜">
            <input type="radio" name="brand" id="n4" value="行箋 ActionNote" data-reason="行動與文字載體兼具">
            <label for="n4"><div class="choice-line"><div><div class="zh">行箋</div><div class="en">ActionNote</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">一紙行動箋，帶有書寫質地與立即執行的暗示。</p><div class="tags"><span class="tag">行動</span><span class="tag">純文字</span></div></label>
          </article>
          <article class="candidate" data-tags="秩序 簡潔 清晰">
            <input type="radio" name="brand" id="n5" value="清序 ClearOrder" data-reason="清晰有序">
            <label for="n5"><div class="choice-line"><div><div class="zh">清序</div><div class="en">ClearOrder</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">把混亂整理成清楚次序，理性、乾淨、可信賴。</p><div class="tags"><span class="tag">秩序</span><span class="tag">簡潔</span></div></label>
          </article>
          <article class="candidate" data-tags="專注 行動 簡潔">
            <input type="radio" name="brand" id="n6" value="專事 FocusOne" data-reason="專注於一件事">
            <label for="n6"><div class="choice-line"><div><div class="zh">專事</div><div class="en">FocusOne</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">把注意力收回眼前一事，克制且目標明確。</p><div class="tags"><span class="tag">專注</span><span class="tag">簡潔</span></div></label>
          </article>
          <article class="candidate" data-tags="秩序 行動 節奏">
            <input type="radio" name="brand" id="n7" value="待序 NextOrder" data-reason="待辦自有次序">
            <label for="n7"><div class="choice-line"><div><div class="zh">待序</div><div class="en">NextOrder</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">等待處理的事自有先後，傳達下一步的節奏。</p><div class="tags"><span class="tag">秩序</span><span class="tag">行動</span></div></label>
          </article>
          <article class="candidate" data-tags="純文字 流動 簡潔">
            <input type="radio" name="brand" id="n8" value="純流 PlainFlow" data-reason="純文字與流暢工作流">
            <label for="n8"><div class="choice-line"><div><div class="zh">純流</div><div class="en">PlainFlow</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">純文字也能自然流動，輕量、開放、不受束縛。</p><div class="tags"><span class="tag">純文字</span><span class="tag">流動</span></div></label>
          </article>
          <article class="candidate" data-tags="行動 純文字 節奏">
            <input type="radio" name="brand" id="n9" value="下一行 NextLine" data-reason="鍵盤工作流的下一步">
            <label for="n9"><div class="choice-line"><div><div class="zh">下一行</div><div class="en">NextLine</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">按下 Enter 就往下一行，也往下一個行動前進。</p><div class="tags"><span class="tag">純文字</span><span class="tag">行動</span></div></label>
          </article>
          <article class="candidate" data-tags="純文字 行動 簡潔">
            <input type="radio" name="brand" id="n10" value="任務線 TaskLine" data-reason="任務與文字行的直接連結">
            <label for="n10"><div class="choice-line"><div><div class="zh">任務線</div><div class="en">TaskLine</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">每一行就是一項任務，直白連結產品使用方式。</p><div class="tags"><span class="tag">純文字</span><span class="tag">簡潔</span></div></label>
          </article>
          <article class="candidate" data-tags="純文字 簡潔 品牌感">
            <input type="radio" name="brand" id="n11" value="整字 TidyTXT" data-reason="整理文字的鮮明品牌感">
            <label for="n11"><div class="choice-line"><div><div class="zh">整字</div><div class="en">TidyTXT</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">把文字任務整理乾淨，俐落拼寫帶出工具個性。</p><div class="tags"><span class="tag">純文字</span><span class="tag">品牌感</span></div></label>
          </article>
          <article class="candidate" data-tags="秩序 品牌感 純文字">
            <input type="radio" name="brand" id="n12" value="清單誌 Clearlist" data-reason="清單感與品牌化拼字">
            <label for="n12"><div class="choice-line"><div><div class="zh">清單誌</div><div class="en">Clearlist</div></div><span class="radio-ui" aria-hidden="true"></span></div><p class="why">清楚的清單，也是一冊持續累積的工作誌。</p><div class="tags"><span class="tag">秩序</span><span class="tag">品牌感</span></div></label>
          </article>
        </div>
      </fieldset>
    </form>

    <aside class="notice" role="note">
      <strong>! 命名安全檢查尚未完成</strong><br>
      所有候選仍需正式商標／網域檢索，再做最終定名。
    </aside>
    <footer>&gt; shortlist: 12 &nbsp;|&nbsp; recommended: 3 &nbsp;|&nbsp; mode: bilingual</footer>
  </main>

  <script>
    (() => {
      const radios = [...document.querySelectorAll('input[name="brand"]')];
      const cards = [...document.querySelectorAll('.candidate')];
      const filters = [...document.querySelectorAll('.filter')];
      const current = document.getElementById('currentChoice');
      const copyButton = document.getElementById('copyButton');
      const copyStatus = document.getElementById('copyStatus');
      const resultCount = document.getElementById('resultCount');

      radios.forEach((radio) => radio.addEventListener('change', () => {
        current.textContent = `${radio.value} — ${radio.dataset.reason}`;
        copyButton.disabled = false;
      }));

      filters.forEach((button) => button.addEventListener('click', () => {
        filters.forEach((item) => item.setAttribute('aria-pressed', String(item === button)));
        const filter = button.dataset.filter;
        let visible = 0;
        cards.forEach((card) => {
          const show = filter === 'all' || card.dataset.tags.split(' ').includes(filter);
          card.hidden = !show;
          if (show) visible += 1;
        });
        resultCount.textContent = `顯示 ${visible} / ${cards.length} 組`;
      }));

      copyButton.addEventListener('click', async () => {
        const selected = radios.find((radio) => radio.checked);
        if (!selected) return;
        const text = `TasksTxt 命名選擇：${selected.value}（${selected.dataset.reason}）。提醒：仍需正式商標／網域檢索。`;
        try {
          await navigator.clipboard.writeText(text);
        } catch (_) {
          const area = document.createElement('textarea');
          area.value = text;
          area.style.position = 'fixed'; area.style.opacity = '0';
          document.body.appendChild(area); area.select(); document.execCommand('copy'); area.remove();
        }
        const oldText = copyButton.textContent;
        copyButton.textContent = '已複製 ✓';
        copyStatus.textContent = '選擇結果已複製到剪貼簿';
        window.setTimeout(() => { copyButton.textContent = oldText; }, 1600);
      });
    })();
  </script>
</body>
</html>
