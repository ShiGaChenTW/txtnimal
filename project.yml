name: txtnimal
options:
  bundleIdPrefix: app.taskstxt
  developmentLanguage: zh-Hant
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  txtnimalCore:
    path: .
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  txtnimal:
    type: application
    platform: macOS
    sources:
      - App
      # First-party plugin fixtures as folder references so main.js/manifest.json land in the
      # bundle under their own subdirectory (the loader looks up subdirectory: "<plugin>").
      # xcodegen has no top-level `resources:` target key — it was silently ignored, so the
      # fixtures never reached the bundle. They must live under `sources` with a resources phase.
      - path: PluginFixtures/task-report
        buildPhase: resources
        type: folder
      - path: PluginFixtures/reviews-pack
        buildPhase: resources
        type: folder
      - path: PluginFixtures/analytics
        buildPhase: resources
        type: folder
    resources:
      - path: App/Resources
    dependencies:
      - package: txtnimalCore
        product: txtnimalCore
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - target: PluginRunnerSpikeService
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.txtnimal.txtnimal
        PRODUCT_NAME: txtnimal
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        # 自用 + 作品集：不進 sandbox，才能讀 ~/Documents/txtnimal；本機 ad-hoc 簽章即可跑
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-Osize"
          DEAD_CODE_STRIPPING: YES
          STRIP_INSTALLED_PRODUCT: YES
          COPY_PHASE_STRIP: YES
  PluginRunnerSpikeService:
    type: xpc-service
    platform: macOS
    sources:
      - path: PluginRunnerSpike/Shared
      - path: PluginRunnerSpike/Service
    dependencies:
      - target: PluginRunnerSpikeWorker
        embed: true
    info:
      path: PluginRunnerSpike/Service-Info.plist
      properties:
        XPCService:
          ServiceType: Application
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.taskstxt.PluginRunnerSpikeService
        PRODUCT_NAME: PluginRunnerSpikeService
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
  PluginRunnerSpikeWorker:
    type: application
    platform: macOS
    sources:
      - path: PluginRunnerSpike/Worker
    entitlements:
      path: PluginRunnerSpike/Worker.entitlements
    info:
      path: PluginRunnerSpike/Worker-Info.plist
      properties:
        LSBackgroundOnly: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.taskstxt.PluginRunnerSpikeWorker
        PRODUCT_NAME: PluginRunnerSpikeWorker
        SWIFT_VERSION: "5.0"
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
  PluginRunnerSpikeHost:
    type: application
    platform: macOS
    sources:
      - path: PluginRunnerSpike/Shared
      - path: PluginRunnerSpike/Host
    dependencies:
      - target: PluginRunnerSpikeService
        embed: true
      - package: txtnimalCore
        product: txtnimalCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.taskstxt.PluginRunnerSpikeHost
        PRODUCT_NAME: PluginRunnerSpikeHost
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
