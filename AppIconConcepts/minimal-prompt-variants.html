<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>txtnimal · Minimal Prompt Variants</title>
  <style>
    :root{--bg:#15171e;--panel:#1b1e27;--fg:#d7d9df;--dim:#7f8796;--line:#303540;--accent:#9ece6a;--selected:#202a24}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace}
    header{position:sticky;top:0;z-index:3;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .bar,main{max-width:1120px;margin:auto}.bar{display:flex;align-items:center;gap:18px;padding:16px 22px}.brand{color:var(--accent);font-weight:700;letter-spacing:.1em}.status{margin-left:auto;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    button{border:0;background:var(--accent);color:#15171e;font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;padding:9px 13px;cursor:pointer}button:disabled{opacity:.35;cursor:not-allowed}button:focus-visible,input:focus-visible+label{outline:2px solid var(--accent);outline-offset:3px}
    main{padding:40px 22px 64px}h1{font-size:clamp(25px,4vw,42px);line-height:1.15;margin:0 0 8px}.intro{color:var(--dim);max-width:720px;margin:0 0 28px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;background:var(--line);border:1px solid var(--line)}article{background:var(--panel);position:relative}input{position:absolute;opacity:0}
    label{display:block;padding:20px;cursor:pointer;height:100%}input:checked+label{background:var(--selected);box-shadow:inset 0 4px var(--accent)}.hero{display:block;width:100%;aspect-ratio:1;object-fit:contain;border-radius:22%;margin-bottom:16px}
    .sizes{display:flex;align-items:end;gap:12px;margin-bottom:18px;color:var(--dim);font-size:10px}.sizes span{display:grid;justify-items:center;gap:4px}.sizes img{border-radius:22%;object-fit:contain}
    .code{font-size:11px;color:var(--accent);letter-spacing:.12em}h2{font-size:19px;margin:7px 0 9px}.desc{color:var(--dim);min-height:68px}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}.tag{border:1px solid var(--line);padding:3px 6px;color:var(--dim);font-size:10px}
    .pick{display:flex;align-items:center;gap:8px;margin-top:16px}.dot{width:15px;height:15px;border:1px solid var(--dim);display:grid;place-items:center}input:checked+label .dot:after{content:"";width:7px;height:7px;background:var(--accent)}
    footer{border-top:1px solid var(--line);padding:18px;text-align:center;color:var(--dim);font-size:11px}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.desc{min-height:0}.hero{max-width:400px;margin-left:auto;margin-right:auto}}
    @media(max-width:560px){.bar{flex-wrap:wrap}.status{order:3;width:100%;margin:0}main{padding:28px 14px 48px}}
    @media(prefers-color-scheme:light){:root{--bg:#fbfaf7;--panel:#efece6;--fg:#2a2d34;--dim:#687080;--line:#d8d4cd;--selected:#e5eee2}}
    @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body>
  <header><div class="bar"><div class="brand">txtnimal</div><div class="status" id="status" aria-live="polite">尚未選擇</div><button id="copy" disabled>複製選擇</button></div></header>
  <main>
    <h1>Minimal Prompt · 三種風格</h1>
    <p class="intro">三款皆保留提示符、底線游標與綠色完成方塊。請特別比較 32px 尺寸，確認 Dock 與 Finder 中仍能快速辨識。</p>
    <section class="grid" aria-label="Minimal Prompt 風格候選">
      <article><input id="a" type="radio" name="variant" value="A — Flat Geometric"><label for="a"><img class="hero" src="txtnimal-icon-05a-flat-geometric.png" alt="A 平面幾何風格"><div class="sizes"><span><img src="txtnimal-icon-05a-flat-geometric.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-05a-flat-geometric.png" width="32" height="32" alt="">32</span></div><div class="code">A / FLAT GEOMETRIC</div><h2>平面幾何</h2><p class="desc">去除材質與陰影，以最乾淨的形狀建立穩定辨識；最適合長期品牌系統與多尺寸輸出。</p><div class="tags"><span class="tag">極簡</span><span class="tag">清楚</span><span class="tag">耐用</span></div><div class="pick"><span class="dot"></span>選擇 A</div></label></article>
      <article><input id="b" type="radio" name="variant" value="B — macOS Glass"><label for="b"><img class="hero" src="txtnimal-icon-05b-glass.png" alt="B macOS 玻璃風格"><div class="sizes"><span><img src="txtnimal-icon-05b-glass.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-05b-glass.png" width="32" height="32" alt="">32</span></div><div class="code">B / MACOS GLASS</div><h2>macOS 玻璃</h2><p class="desc">以霧面玻璃與收斂高光提升原生感，質感細緻；在深色 Dock 上會最像成熟 macOS 工具。</p><div class="tags"><span class="tag">原生</span><span class="tag">精緻</span><span class="tag">現代</span></div><div class="pick"><span class="dot"></span>選擇 B</div></label></article>
      <article><input id="c" type="radio" name="variant" value="C — Retro CRT Pixel"><label for="c"><img class="hero" src="txtnimal-icon-05c-crt-pixel.png" alt="C 復古 CRT 像素風格"><div class="sizes"><span><img src="txtnimal-icon-05c-crt-pixel.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-05c-crt-pixel.png" width="32" height="32" alt="">32</span></div><div class="code">C / RETRO CRT PIXEL</div><h2>復古 CRT 像素</h2><p class="desc">用像素網格、掃描線與螢光綠強化 terminal 個性；品牌最鮮明，但復古語氣也最強。</p><div class="tags"><span class="tag">終端</span><span class="tag">個性</span><span class="tag">復古</span></div><div class="pick"><span class="dot"></span>選擇 C</div></label></article>
    </section>
  </main>
  <footer>選定後將製作正式 macOS AppIcon iconset，並針對 16／32px 進行光學修正。</footer>
  <script>
    const choices=[...document.querySelectorAll('input[name=variant]')],status=document.querySelector('#status'),copy=document.querySelector('#copy');
    choices.forEach(choice=>choice.addEventListener('change',()=>{status.textContent=`已選：${choice.value}`;copy.disabled=false}));
    copy.addEventListener('click',async()=>{const choice=choices.find(x=>x.checked);if(!choice)return;await navigator.clipboard.writeText(`txtnimal Minimal Prompt 選擇：${choice.value}`);copy.textContent='已複製';setTimeout(()=>copy.textContent='複製選擇',1200)});
  </script>
</body>
</html>
