<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>txtnimal · App Icon 選擇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#15171e;--panel:#1b1e27;--fg:#d7d9df;--dim:#858c9b;--line:#303540;--accent:#4fd6c4;--pick:#222b2f;--space:16px }
    * { box-sizing:border-box }
    body { margin:0;background:var(--bg);color:var(--fg);font-family:"IBM Plex Mono","Noto Sans TC",monospace;min-height:100vh }
    header { position:sticky;top:0;z-index:4;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--line) }
    .bar { max-width:1180px;margin:auto;padding:18px 24px;display:flex;gap:20px;align-items:center }
    .brand { font-weight:600;letter-spacing:.08em;color:var(--accent) }
    .status { margin-left:auto;color:var(--dim);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
    button { font:inherit;color:var(--bg);background:var(--accent);border:0;padding:9px 13px;cursor:pointer;font-weight:600 }
    button:disabled { opacity:.35;cursor:not-allowed }
    button:focus-visible,input:focus-visible+label { outline:2px solid var(--accent);outline-offset:3px }
    main { max-width:1180px;margin:auto;padding:42px 24px 64px }
    h1 { margin:0 0 10px;font-size:clamp(24px,4vw,42px);line-height:1.1 }
    .intro { color:var(--dim);margin:0 0 30px;max-width:720px;line-height:1.7 }
    .grid { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1px;background:var(--line);border:1px solid var(--line) }
    article { position:relative;background:var(--panel) }
    article:last-child:nth-child(odd) { grid-column:1/-1 }
    input { position:absolute;opacity:0;pointer-events:none }
    label { display:grid;grid-template-columns:minmax(180px,280px) 1fr;gap:24px;padding:22px;cursor:pointer;min-height:330px }
    input:checked+label { background:var(--pick);box-shadow:inset 4px 0 var(--accent) }
    .visual { display:grid;place-items:center;align-content:center;gap:14px }
    .hero { width:min(100%,256px);aspect-ratio:1;object-fit:contain;border-radius:22%;display:block }
    .sizes { display:flex;align-items:end;gap:12px;color:var(--dim);font-size:10px }
    .sizes span { display:grid;gap:4px;justify-items:center }
    .sizes img { object-fit:contain;border-radius:22% }
    .copy { align-self:center;padding-top:8px }
    .number { color:var(--accent);font-size:12px;letter-spacing:.15em }
    h2 { font-size:20px;margin:8px 0 12px }
    p { color:var(--dim);line-height:1.65;margin:0 }
    .tags { display:flex;flex-wrap:wrap;gap:7px;margin-top:18px }
    .tag { border:1px solid var(--line);padding:4px 7px;font-size:11px;color:var(--dim) }
    .radio { display:inline-flex;align-items:center;gap:9px;margin-top:24px;color:var(--fg);font-size:12px }
    .dot { width:15px;height:15px;border:1px solid var(--dim);display:inline-grid;place-items:center }
    input:checked+label .dot::after { content:"";width:7px;height:7px;background:var(--accent) }
    footer { color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding:20px 24px;text-align:center }
    @media(max-width:900px){.grid{grid-template-columns:1fr}article:last-child:nth-child(odd){grid-column:auto}}
    @media(max-width:620px){.bar{align-items:flex-start;flex-wrap:wrap}.status{order:3;margin:0;width:100%}main{padding:30px 16px 48px}label{grid-template-columns:1fr}.hero{width:220px}}
    @media(prefers-color-scheme:light){:root{--bg:#fbfaf7;--panel:#efece6;--fg:#2a2d34;--dim:#687080;--line:#d8d4cd;--pick:#e4eee9}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <header><div class="bar"><div class="brand">txtnimal</div><div class="status" id="status" aria-live="polite">尚未選擇</div><button id="copy" disabled>複製選擇</button></div></header>
  <main>
    <h1 data-pretext contenteditable="true">選擇 App Icon</h1>
    <p class="intro" data-pretext contenteditable="true">請同時觀察大圖的品牌個性與 32px 小圖的辨識度。點擊任一卡片完成單選，再複製結果回傳。</p>
    <section class="grid" aria-label="txtnimal App Icon 候選">
      <article><input id="v1" type="radio" name="icon" value="版本 1 — Cursor Check"><label for="v1"><div class="visual"><img class="hero" src="txtnimal-icon-01-cursor-check.png" alt="版本 1 Cursor Check"><div class="sizes"><span><img src="txtnimal-icon-01-cursor-check.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-01-cursor-check.png" width="32" height="32" alt="">32</span></div></div><div class="copy"><div class="number">01 / CURSOR CHECK</div><h2>游標勾選</h2><p data-pretext contenteditable="true">文字游標、清單線與完成勾號合成一個符號，最直接連結鍵盤輸入與任務完成。</p><div class="tags"><span class="tag">鍵盤優先</span><span class="tag">任務明確</span><span class="tag">品牌完整</span></div><div class="radio"><span class="dot"></span>選擇版本 1</div></div></label></article>
      <article><input id="v2" type="radio" name="icon" value="版本 2 — Folded Sheet"><label for="v2"><div class="visual"><img class="hero" src="txtnimal-icon-02-folded-sheet.png" alt="版本 2 Folded Sheet"><div class="sizes"><span><img src="txtnimal-icon-02-folded-sheet.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-02-folded-sheet.png" width="32" height="32" alt="">32</span></div></div><div class="copy"><div class="number">02 / FOLDED SHEET</div><h2>摺頁清單</h2><p data-pretext contenteditable="true">純文字文件與完成符號融合，最容易讓一般使用者理解這是一款檔案型任務工具。</p><div class="tags"><span class="tag">純文字</span><span class="tag">親和</span><span class="tag">用途清楚</span></div><div class="radio"><span class="dot"></span>選擇版本 2</div></div></label></article>
      <article><input id="v3" type="radio" name="icon" value="版本 3 — Ordered Grid"><label for="v3"><div class="visual"><img class="hero" src="txtnimal-icon-03-ordered-grid.png" alt="版本 3 Ordered Grid"><div class="sizes"><span><img src="txtnimal-icon-03-ordered-grid.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-03-ordered-grid.png" width="32" height="32" alt="">32</span></div></div><div class="copy"><div class="number">03 / ORDERED GRID</div><h2>整理網格</h2><p data-pretext contenteditable="true">用排列中的字元方塊表現「把混亂整理好」，抽象、安靜，也最接近 minimal 的概念。</p><div class="tags"><span class="tag">極簡</span><span class="tag">秩序</span><span class="tag">抽象</span></div><div class="radio"><span class="dot"></span>選擇版本 3</div></div></label></article>
      <article><input id="v4" type="radio" name="icon" value="版本 4 — Focus Orbit"><label for="v4"><div class="visual"><img class="hero" src="txtnimal-icon-04-focus-orbit.png" alt="版本 4 Focus Orbit"><div class="sizes"><span><img src="txtnimal-icon-04-focus-orbit.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-04-focus-orbit.png" width="32" height="32" alt="">32</span></div></div><div class="copy"><div class="number">04 / FOCUS ORBIT</div><h2>專注軌道</h2><p data-pretext contenteditable="true">中心任務被 List 與 Tag 軌道環繞，對應產品的 Focus 核心與多維分類方式。</p><div class="tags"><span class="tag">Focus</span><span class="tag">List／Tag</span><span class="tag">技術感</span></div><div class="radio"><span class="dot"></span>選擇版本 4</div></div></label></article>
      <article><input id="v5" type="radio" name="icon" value="版本 5 — Minimal Prompt"><label for="v5"><div class="visual"><img class="hero" src="txtnimal-icon-05-minimal-prompt.png" alt="版本 5 Minimal Prompt"><div class="sizes"><span><img src="txtnimal-icon-05-minimal-prompt.png" width="64" height="64" alt="">64</span><span><img src="txtnimal-icon-05-minimal-prompt.png" width="32" height="32" alt="">32</span></div></div><div class="copy"><div class="number">05 / MINIMAL PROMPT</div><h2>極簡提示符</h2><p data-pretext contenteditable="true">只保留終端提示符、游標與完成色，識別度最高，也最忠於 txtnimal 的命名語氣。</p><div class="tags"><span class="tag">Terminal</span><span class="tag">高辨識</span><span class="tag">最小元素</span></div><div class="radio"><span class="dot"></span>選擇版本 5</div></div></label></article>
    </section>
  </main>
  <footer>候選圖為方向稿；選定後再製作正式 AppIcon iconset 與小尺寸光學修正。</footer>
  <!-- FALLBACK: vendor/pretext.js missing, using CDN -->
  <script type="module">
    const radios=[...document.querySelectorAll('input[name=icon]')],status=document.querySelector('#status'),copy=document.querySelector('#copy');
    radios.forEach(r=>r.addEventListener('change',()=>{status.textContent=`已選：${r.value}`;copy.disabled=false}));
    copy.addEventListener('click',async()=>{const r=radios.find(x=>x.checked);if(!r)return;const text=`txtnimal icon 選擇：${r.value}`;await navigator.clipboard.writeText(text);copy.textContent='已複製';setTimeout(()=>copy.textContent='複製選擇',1200)});
    try {
      const {prepare,layout}=await import('https://esm.sh/@chenglou/pretext');await document.fonts.ready;
      const els=[...document.querySelectorAll('[data-pretext]')],prepared=new Map();
      const prep=el=>prepared.set(el,prepare(el.textContent,getComputedStyle(el).font));els.forEach(prep);
      const relayout=()=>els.forEach(el=>{const h=prepared.get(el);if(!h)return;layout(h,Math.max(el.clientWidth,1),parseFloat(getComputedStyle(el).lineHeight)||24)});
      new ResizeObserver(relayout).observe(document.body);els.forEach(el=>new MutationObserver(()=>{prep(el);relayout()}).observe(el,{characterData:true,subtree:true,childList:true}));relayout();
    } catch (_) { /* CSS layout remains fully functional offline. */ }
  </script>
</body>
</html>
